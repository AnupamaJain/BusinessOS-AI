<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SaarthiOne Peacock Feather Logo">
  <defs>
    <linearGradient id="cyanBlue" x1="100" y1="50" x2="400" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F2FE"/>
      <stop offset="0.5" stop-color="#2B6CFF"/>
      <stop offset="1" stop-color="#00FF87"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="200" y1="150" x2="312" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CF9FF"/>
      <stop offset="1" stop-color="#0A4A6B"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="200" y1="200" x2="312" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FFA500"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="256" cy="230" r="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F2FE" stop-opacity="0.9"/>
      <stop offset="0.6" stop-color="#2B6CFF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark Luxury Container Tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0B1220"/>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#cyanBlue)" opacity="0.08"/>
  <rect x="17.5" y="17.5" width="477" height="477" rx="110.5" stroke="url(#cyanBlue)" stroke-opacity="0.4" stroke-width="3"/>

  <!-- Peacock Feather Stem / Shaft -->
  <path d="M140 410 C180 370 230 300 256 220" stroke="url(#cyanBlue)" stroke-width="12" stroke-linecap="round"/>

  <!-- Outer Feather Vanes (Emerald & Cyan Leaves) -->
  <!-- Left Vanes -->
  <path d="M256 220 C200 180 140 220 160 300 C190 320 225 280 240 250" fill="none" stroke="#00FF87" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M240 250 C180 220 130 270 145 340 C175 350 205 320 225 290" fill="none" stroke="#00F2FE" stroke-width="12" stroke-linecap="round"/>
  <path d="M225 290 C160 270 120 320 135 380 C165 390 195 360 210 330" fill="none" stroke="#2B6CFF" stroke-width="10" stroke-linecap="round"/>

  <!-- Right Vanes -->
  <path d="M256 220 C312 180 372 220 352 300 C322 320 287 280 272 250" fill="none" stroke="#00FF87" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M272 250 C332 220 382 270 367 340 C337 350 307 320 287 290" fill="none" stroke="#00F2FE" stroke-width="12" stroke-linecap="round"/>
  <path d="M287 290 C352 270 392 320 377 380 C347 390 317 360 302 330" fill="none" stroke="#2B6CFF" stroke-width="10" stroke-linecap="round"/>

  <!-- Upper Feather Crown Pinnae -->
  <path d="M256 220 C230 140 210 90 256 60 C302 90 282 140 256 220 Z" fill="none" stroke="url(#cyanBlue)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256 160 C240 110 230 85 256 70 C282 85 272 110 256 160 Z" fill="#00FF87" opacity="0.6"/>

  <!-- Core Glow Radial -->
  <circle cx="256" cy="220" r="90" fill="url(#coreGlow)"/>

  <!-- Central Peacock Eye (Teardrop Node) -->
  <path d="M256 130 C200 180 200 250 256 290 C312 250 312 180 256 130 Z" fill="url(#eyeGrad)" stroke="url(#cyanBlue)" stroke-width="8"/>

  <!-- Gold Ring Accent -->
  <circle cx="256" cy="220" r="42" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- AI Beacon Center Node -->
  <circle cx="256" cy="220" r="22" fill="#00F2FE"/>
  <circle cx="256" cy="220" r="12" fill="#FFFFFF"/>

  <!-- Rays / Tech Lines -->
  <line x1="256" y1="165" x2="256" y2="150" stroke="#00F2FE" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="275" x2="256" y2="290" stroke="#00F2FE" stroke-width="4" stroke-linecap="round"/>
  <line x1="201" y1="220" x2="186" y2="220" stroke="#00F2FE" stroke-width="4" stroke-linecap="round"/>
  <line x1="311" y1="220" x2="326" y2="220" stroke="#00F2FE" stroke-width="4" stroke-linecap="round"/>
</svg>
